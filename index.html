    function buyStock(code, shares) { const price=getStockPrice(code); const totalCost=calcBuyTotalCost(shares,price); if(totalCost>state.cash) return false; state.cash-=totalCost; if(!state.holdings[code]) state.holdings[code]={shares:0,lockedShares:0,totalCost:0,avgCost:0}; const h=state.holdings[code]; const newShares=h.shares+shares; const newTotalCost=h.totalCost+totalCost; h.shares=newShares; h.totalCost=newTotalCost; h.avgCost=newTotalCost/newShares; h.lockedShares=(h.lockedShares||0)+shares; state.tradeLog.push({day:state.day,action:'buy',code,shares,price,totalCost}); state.dayOrders.push({action:'buy',code,shares,price}); return true; }
    function sellStock(code, shares) { const h=state.holdings[code]; if(!h||h.shares<shares||shares<=0) return false; const available=getAvailableShares(code); if(shares>available) return false; const price=getStockPrice(code); const netProceed=calcSellNetProceed(shares,price); if(netProceed<0) return false; const remainingShares=h.shares-shares; const remainingTotalCost=h.totalCost-netProceed; state.cash+=netProceed; if(remainingShares<=0.001) delete state.holdings[code]; else { h.shares=remainingShares; h.totalCost=remainingTotalCost; h.avgCost=remainingTotalCost/remainingShares; if(h.lockedShares>remainingShares) h.lockedShares=remainingShares; } state.tradeLog.push({day:state.day,action:'sell',code,shares,price,netProceed}); state.dayOrders.push({action:'sell',code,shares,price}); return true; }
    function endDay() { if(state.dayOrders.length===0) state.tradeLog.push({day:state.day,action:'skip'}); state.dayOrders=[]; if(state.day>=TOTAL_DAYS){ state.phase='result'; render(); return; } state.day++; for(let code in state.holdings) if(state.holdings[code]) state.holdings[code].lockedShares=0; state.selectedStock=null; state.pendingAction=null; state.inputQty=''; render(); }
    function initGame() { state.cash=INITIAL_CASH; state.holdings={}; state.day=1; state.phase='trading'; state.tradeLog=[]; state.dayOrders=[]; state.selectedStock=null; state.pendingAction=null; state.inputQty=''; state.stockPrices=JSON.parse(JSON.stringify(REAL_PRICES)); render(); }
    function getStockValue() { let val=0; for(let [code,h] of Object.entries(state.holdings)) val+=h.shares*getStockPrice(code); return val; }
    function getNetAsset() { return getStockValue()+state.cash; }

    function renderSetup() { return `<div class="asset-bar" style="justify-content:center;"><span>📈 投资人格测试 · 多维洞察</span></div><div class="main-card"><h2>准备开始</h2><p>初始资金 ¥500,000 · 10个交易日</p><div style="background:#fef9f3;border-radius:10px;padding:12px;margin-bottom:14px;">✅ 买入佣金万3（最低5元），卖出佣金+印花税千1<br>✅ T+1规则：当日买入次日可卖<br>📌本次模拟使用真实数据,历史股价数据为(5-28至6-10),股价交易价为(当日最高级+当日最低价)/2,仅供娱乐用途,不构成投资建议,投资需谨慎!!!<br></div><div style="text-align:center;"><button class="btn btn-endday" id="btnStart">🎯 开始测试</button></div></div>`; }
    
    function renderTrading() {
      const net=getNetAsset(); const stockVal=getStockValue(); const netClass=net>=INITIAL_CASH?'pos':'neg';
      const currentIdx=getCurrentSHIndex(); const {change,percent}=getIndexChange(); const sign=change>=0?'+':''; const indexColor=change>=0?'#f07060':'#5cc08a';
      const assetHtml=`<div class="asset-bar" id="assetBar"><div class="asset-item"><div class="asset-label">💰 现金</div><div class="asset-value neutral">¥${state.cash.toFixed(2)}</div></div><div class="asset-divider"></div><div class="asset-item"><div class="asset-label">📦 市值</div><div class="asset-value neutral">¥${stockVal.toFixed(2)}</div></div><div class="asset-divider"></div><div class="asset-net"><div class="asset-label">📊 净资产</div><div class="asset-value ${netClass}">¥${net.toFixed(2)}</div></div><div class="index-area"><div class="sh-index-click" id="shIndexClick"><div class="asset-label" style="font-size:0.65rem;">上证指数</div><div><span class="index-value">${currentIdx.close.toFixed(2)}</span><span style="color:${indexColor};" class="index-change"> ${sign}${change.toFixed(2)} (${sign}${percent.toFixed(2)}%)</span></div></div><div class="volume-analysis-btn" id="volumeAnalysisBtn">📊 成交量分析</div></div></div>`;
      let rows = '';
      for (let s of STOCKS) {
        const price = getStockPrice(s.code);
        const prevPrice = state.day > 1 ? state.stockPrices[s.code][state.day-2] : price;
        const changeStock = price - prevPrice;
        const chgPct = prevPrice !== 0 ? changeStock / prevPrice : 0;
        const chgClass = chgPct > 0.005 ? 'up' : (chgPct < -0.005 ? 'down' : 'flat');
        const priceClass = chgPct > 0.005 ? 'price-up' : (chgPct < -0.005 ? 'price-down' : '');

        const locked = hasHolding ? (h.lockedShares || 0) : 0;
        const costStr = hasHolding ? h.avgCost.toFixed(2) : '—';

        const profitClass = hasHolding ? (profit >= 0 ? 'profit-positive' : 'profit-negative') : '';
        let sharesDisplay = hasHolding ? `${totalShares.toFixed(1)}` : '—';
        if (locked > 0.05) sharesDisplay += ` <span class="lock-icon" title="T+1锁定">🔒${locked.toFixed(1)}</span>`;
        // 股票名称单元格
const rowSelected = (state.selectedStock === s.code) ? 'selected' : '';
rows += `<tr data-stock="${s.code}" class="${rowSelected}" style="vertical-align: middle;">
  <td style="white-space: nowrap;"><span class="stock-name-cell" data-code="${s.code}" title="点击查看${s.name}财务详情">${s.name}</span><br><span style="font-size:0.65rem;">${s.code}</span></td>

          <td style="text-align: center; white-space: nowrap;"><span class="change-badge ${chgClass}">${changeStock>=0?'+':''}${changeStock.toFixed(2)} (${(chgPct*100).toFixed(2)}%)</span></td>
          <td style="text-align: center; white-space: nowrap;">${costStr}</td>
          <td class="${profitClass}" style="text-align: center; white-space: nowrap;">${profit}</td>
          <td style="text-align: center; white-space: nowrap;">${sharesDisplay}</td>
          <td style="text-align: center; white-space: nowrap;"><span class="sector-link" data-sector="${s.code}">${s.sector} 🔍</span></td>
          <td style="text-align: center; white-space: nowrap;"><button class="stock-kline-btn" data-kline="${s.code}">📊 K线</button></td>
        </td>`;
      }
      let actionHtml=''; const selStock=state.selectedStock?STOCKS.find(s=>s.code===state.selectedStock):null;

      else { actionHtml=`<div style="display:flex;gap:8px;"><button class="btn btn-buy" id="btnInitBuy">📈 买入</button><button class="btn btn-sell" id="btnInitSell">📉 卖出</button><button class="btn btn-endday" id="btnEndDay">⏭ 结束今日</button></div>`; }
      return `${assetHtml}<div class="main-card"><div class="progress-wrap"><span>📅 交易日</span><div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${(state.day/TOTAL_DAYS)*100}%;"></div></div><span class="progress-text">第 ${state.day} / ${TOTAL_DAYS} 天</span></div><div class="table-wrap"><table class="stock-table"><thead><tr><th>股票</th><th>现价</th><th>涨跌</th><th>成本</th><th>收益额</th><th>持仓(股)</th><th>行业</th><th>K线分析</th></tr></thead><tbody>${rows}</tbody></table></div><div class="action-area">${actionHtml}</div></div>`;
    }
    
    function renderResult() { const ret = getFinalReturn(); const net = getNetAsset(); const p = getPersonality(ret); const dimensionHtml = `<div class="dimension-grid"><div class="dim-item"><strong>🧠 情绪稳定性</strong><p>${p.emotional}</p></div><div class="dim-item"><strong>📚 认知深度</strong><p>${p.cognitive}</p></div><div class="dim-item"><strong>🔍 观察敏锐度</strong><p>${p.observation}</p></div></div>`; return `<div class="asset-bar" style="justify-content:center;">最终净资产：¥${net.toFixed(2)}</div><div class="main-card"><div class="result-hero"><img src="${p.image}" class="result-img" onerror="this.style.display='none'"><div class="result-avatar">${p.avatar}</div><div class="result-name">${p.name}</div><div class="result-return ${ret>=0?'pos':'neg'}">${(ret*100).toFixed(2)}%</div></div><div class="result-analysis"><h4>🔍 投资人格分析</h4><p>${p.desc}</p><div>标签：${p.tags.join(' · ')}</div></div>${dimensionHtml}<div style="text-align:center;margin-top:16px;"><button class="btn btn-skip" id="btnRestart">🔄 重新测试</button></div></div>`; }
    
    function showToast(msg,type='info'){ const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.style.cssText=`padding:10px 20px;border-radius:25px;font-weight:700;margin-bottom:8px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.2);`; t.style.background=type==='danger'?'#f8d7da':'#d4edda'; t.style.color=type==='danger'?'#721c24':'#155724'; t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),2500); }
    function showModal(stock) { const container=document.getElementById('modalContainer'); container.innerHTML=`<div class="modal-overlay" id="modalOverlay"><div class="modal-content"><span class="modal-close">&times;</span><h3>${stock.name} (${stock.code})</h3><p><strong>行业：</strong>${stock.sector}</p><p>${stock.sectorDesc}</p><div style="background:#f9f5ed;border-radius:8px;padding:10px;"><div>📊 一季报: 营收 ${stock.revenue}</div><div>💰 净利润 ${stock.netProfit}</div></div></div></div>`; const closeBtn = container.querySelector('.modal-close'); if(closeBtn) closeBtn.addEventListener('click',()=>container.innerHTML=''); const overlay=document.getElementById('modalOverlay'); if(overlay) overlay.addEventListener('click',e=>{if(e.target.id==='modalOverlay') container.innerHTML='';}); }
    
    function bindEvents(){
      if(state.phase==='setup'){ document.getElementById('btnStart')?.addEventListener('click',initGame); }
      else if(state.phase==='trading'){
        // 个股名称点击
        document.querySelectorAll('.stock-name-cell').forEach(el=>{
          el.removeEventListener('click', stockNameHandler);
          el.addEventListener('click', stockNameHandler);
        });
        function stockNameHandler(e){ e.stopPropagation(); const code = this.dataset.code; const stock = STOCKS.find(s=>s.code===code); if(stock) showStockDetail(stock); }
        // 行选中（买卖逻辑）排除点击名称、行业链接、k线按钮区域
        document.querySelectorAll('tr[data-stock]').forEach(row=>row.addEventListener('click',(e)=>{ 
          if(!e.target.classList.contains('sector-link') && !e.target.classList.contains('stock-kline-btn') && !e.target.classList.contains('stock-name-cell')){
            const code=row.dataset.stock; 
            state.selectedStock=state.selectedStock===code?null:code; 
            state.pendingAction=null; 
            state.inputQty=''; 
            render(); 
          } 
        }));
        document.querySelectorAll('.sector-link').forEach(el=>el.addEventListener('click',(e)=>{ e.stopPropagation(); const stock=STOCKS.find(s=>s.code===el.dataset.sector); if(stock) showModal(stock); }));
        document.querySelectorAll('.stock-kline-btn').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); const code=btn.dataset.kline; const stock=STOCKS.find(s=>s.code===code); if(stock) showStockKline(stock); }));
        document.getElementById('btnInitBuy')?.addEventListener('click',()=>{ if(!state.selectedStock){ showToast('请先选择股票','warn'); return; } state.pendingAction='buy'; state.inputQty=''; render(); });
        document.getElementById('btnInitSell')?.addEventListener('click',()=>{ if(!state.selectedStock||!state.holdings[state.selectedStock]){ showToast('未持有该股','warn'); return; } if(getAvailableShares(state.selectedStock)<=0){ showToast('当日买入的股票需T+1才能卖出','warn'); return; } state.pendingAction='sell'; state.inputQty=''; render(); });
        document.querySelectorAll('[data-fill]').forEach(btn=>btn.addEventListener('click',function(){ const type=this.dataset.fill,code=state.selectedStock; if(!code) return; const maxBuy=getMaxBuyShares(code); const availSell=getAvailableShares(code); if(type==='fullBuy') state.inputQty=maxBuy.toString(); else if(type==='threeQuarterBuy') state.inputQty=Math.floor(maxBuy*0.75).toString(); else if(type==='halfBuy') state.inputQty=Math.floor(maxBuy*0.5).toString(); else if(type==='quarterBuy') state.inputQty=Math.floor(maxBuy*0.25).toString(); else if(type==='fullSell') state.inputQty=availSell.toString(); else if(type==='threeQuarterSell') state.inputQty=Math.floor(availSell*0.75).toString(); else if(type==='halfSell') state.inputQty=Math.floor(availSell*0.5).toString(); else if(type==='quarterSell') state.inputQty=Math.floor(availSell*0.25).toString(); render(); }));
        const qtyInput=document.getElementById('qtyInput'); if(qtyInput) qtyInput.addEventListener('input',(e)=>{ state.inputQty=e.target.value; });
        document.getElementById('btnConfirmBuy')?.addEventListener('click',()=>{ const qty=parseInt(state.inputQty); if(isNaN(qty)||qty<=0) showToast('请输入有效股数','warn'); else if(buyStock(state.selectedStock,qty)){ showToast('买入成功'); state.pendingAction=null; state.inputQty=''; render(); } else showToast('资金不足或股数无效','danger'); });
        document.getElementById('btnConfirmSell')?.addEventListener('click',()=>{ const qty=parseInt(state.inputQty); if(isNaN(qty)||qty<=0) showToast('请输入有效股数','warn'); else if(sellStock(state.selectedStock,qty)){ showToast('卖出成功'); state.pendingAction=null; state.inputQty=''; render(); } else showToast('卖出失败 (可用股数不足)','danger'); });
        document.getElementById('btnCancel')?.addEventListener('click',()=>{ state.pendingAction=null; state.inputQty=''; render(); });
        document.getElementById('btnEndDay')?.addEventListener('click',endDay);
        document.getElementById('shIndexClick')?.addEventListener('click',()=>showSHKline());
        document.getElementById('volumeAnalysisBtn')?.addEventListener('click',()=>showVolumeOnly());
        document.getElementById('assetBar')?.classList.add('pulse');
      } else if(state.phase==='result'){ document.getElementById('btnRestart')?.addEventListener('click',()=>{ state.phase='setup'; render(); }); }
    }
    function render(){ const root=document.getElementById('appRoot'); if(!root) return; if(state.phase==='setup') root.innerHTML=renderSetup(); else if(state.phase==='trading') root.innerHTML=renderTrading(); else if(state.phase==='result') root.innerHTML=renderResult(); bindEvents(); }
    state.phase='setup';
    render();
  })();
</script>
</body>
</html>
